name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Split-CI coverage policy (Phase 4, mirroring the go-asmgen org).
#
# A single `go test -coverpkg` run cannot reach 100% statement coverage over a
# SIMD-dispatched package: each arch's cmulSIMD wrapper only exists and runs on
# that arch — the amd64 SSE2 wrapper (cmul_amd64.go → cmul_amd64.s), the arm64
# NEON wrapper (cmul_arm64.go → cmul_arm64.s), the riscv64 RVV wrapper
# (cmul_riscv64.go → cmul_riscv64.s, run-time V-gated), and the scalar-fallback
# wrapper (cmul_generic.go, loong64/ppc64le). No single build sees more than one
# of them, so no single run covers them all.
#
# The honest fix, used here:
#   * The pure-Go scalar CORE (CMulScalar, CMul, BitReverse, Radix2, …) is held
#     to 100% statement coverage by the `test` gate below. That gate runs on the
#     GitHub-hosted amd64 AND arm64 runners; on each, exactly one cmulSIMD
#     wrapper is compiled (the amd64 SSE2 wrapper or the arm64 NEON wrapper) and
#     it IS exercised by the SIMD-vs-scalar test, so the gate legitimately
#     reaches 100% on every OS it runs on — nothing is excluded that a per-arch
#     job does not run.
#   * The generated Plan 9 assembly carries no Go statements, so it cannot be
#     "covered" by the statement gate. It is instead validated by the per-arch
#     execution jobs (arch-native / arch-qemu): each regenerates the committed
#     .s with go-asmgen, fails if it is stale, vets it (asmdecl cross-checks
#     every name+offset(FP)), builds it (cmd/asm encodes/validates the
#     mnemonics), and RUNS the test suite — whose TestCMul* assert the SIMD
#     kernel is bit-for-bit identical to the scalar oracle.
#
# So every line is either statement-covered by the gate or executed by a
# per-arch job; the gate is never lowered and there is no coverage-gaming knob.
#
# Which arches ship a SIMD kernel, and why bit-for-bit identity decides it.
# amd64 SSE2 (MULPD/ADDPD, separately rounded) matches its non-fused GOAMD64=v1
# oracle. On arm64 FMA is baseline, so the gc compiler fuses the oracle itself
# (FMSUBD/FMADDD); the NEON kernel reproduces that exact fusion (VLD2/VST2 +
# VFMLA/VFMLS) and is therefore bit-identical too — fusion is matched, not
# avoided. s390x — the only big-endian target — also ships one: its vector
# facility (VFMDB/VFMSDB/VFMADB, 2-wide double) reproduces the oracle's fused
# FMSUB/FMADD, and the qemu-s390x job proves it bit-identical with correct
# big-endian lane order. riscv64 ships an RVV 1.0 kernel (VLSEG2E64V deinterleave
# + VFMUL.VV/VFNMSAC.VV/VFMACC.VV reproducing the oracle's fused FNMSUBD/FMADDD),
# HARDWARE-VALIDATED bit-identical on cfarm95 (a SpacemiT X60, RVA22 + RVV 1.0,
# GCC Compile Farm). Because the V extension is OPTIONAL and ABSENT from this
# job's default qemu-riscv64 CPU (VSETVLI would SIGILL), cmul_riscv64.go detects
# V at RUN TIME and runs the SCALAR path here, and the SIMD-vs-scalar test SKIPs
# its RVV comparison ("no RVV") — so this qemu job stays green while the RVV
# proof is supplied by cfarm95. loong64/ppc64le keep the validated scalar path
# (LSX/VSX expose no vector double arithmetic in the Go assembler — see
# cmul_generic.go). Shipping even a 1-ULP-different kernel is a correctness
# divergence the project rejects. See docs/plan-fft.md (Phase 4).
jobs:
  # Pure-Go coverage gate: build, vet, race-test, enforce 100% statement
  # coverage of the portable core. Runs on amd64 (ubuntu/windows) and arm64
  # (macos), so on each host exactly one cmulSIMD wrapper compiles and is
  # exercised — the gate reaches 100% without excluding any reachable line.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: Test + 100% coverage gate
        shell: bash
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 25
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Native per-arch execution. amd64/arm64 have GitHub-hosted runners, so the
  # generated assembly (where present) runs natively. Each job regenerates the
  # committed .s via go-asmgen and fails if it is stale, then vets/builds/runs
  # the suite — TestCMul* assert SIMD == scalar bit-for-bit.
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: amd64, regen: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64, regen: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go env GOARCH
      - name: Regenerate committed assembly and check it is current
        if: matrix.regen != ''
        run: |
          ( cd internal/kernels/asmgen/${{ matrix.regen }} && GOFLAGS=-mod=mod go run gen.go )
          mv internal/kernels/asmgen/${{ matrix.regen }}/cmul_${{ matrix.regen }}.s \
             internal/kernels/cmul_${{ matrix.regen }}.s
          # amd64 also generates the SSE2 butterfly STAGE kernels (the routed FFT
          # hot loop); arm64 does not (it uses the gc-autovectorized Go loop).
          if [ -f internal/kernels/asmgen/${{ matrix.regen }}/butterfly_${{ matrix.regen }}.s ]; then
            mv internal/kernels/asmgen/${{ matrix.regen }}/butterfly_${{ matrix.regen }}.s \
               internal/kernels/butterfly_${{ matrix.regen }}.s
          fi
          git diff --exit-code -- internal/kernels/cmul_${{ matrix.regen }}.s \
             internal/kernels/butterfly_${{ matrix.regen }}.s 2>/dev/null || {
            echo "::error::generated ${{ matrix.regen }} assembly is stale; run go generate and commit"; exit 1; }
      - name: Vet (asmdecl) + build + run (SIMD == scalar)
        run: |
          go vet ./...
          go build ./...
          go test ./...

  # qemu-user execution for the targets without a hosted runner. s390x ships a
  # vector-facility SIMD kernel (regen-checked below, then the qemu run asserts
  # SIMD == scalar bit-for-bit on the project's only big-endian target). riscv64
  # ships an RVV kernel whose .s is regen-checked here too, but its V extension is
  # absent from this default qemu CPU, so cmul_riscv64.go runs SCALAR and the
  # SIMD-vs-scalar test SKIPs ("no RVV") — green here; the RVV bit-identity proof
  # is run on real hardware (cfarm95, RVV 1.0). loong64/ppc64le ship no SIMD
  # kernel (validated scalar path; see cmul_generic.go), so for them this job is
  # the endianness/word-size guard and the trivially-scalar==scalar SIMD test.
  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static, regen: riscv64 }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x,   qemu: qemu-s390x-static, regen: s390x }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Regenerate committed assembly and check it is current
        if: matrix.regen != ''
        run: |
          ( cd internal/kernels/asmgen/${{ matrix.regen }} && GOFLAGS=-mod=mod go run gen.go )
          mv internal/kernels/asmgen/${{ matrix.regen }}/cmul_${{ matrix.regen }}.s \
             internal/kernels/cmul_${{ matrix.regen }}.s
          git diff --exit-code -- internal/kernels/cmul_${{ matrix.regen }}.s || {
            echo "::error::generated ${{ matrix.regen }} assembly is stale; run go generate and commit"; exit 1; }
      - name: Vet + test under qemu (${{ matrix.goarch }})
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go vet ./...
          GOARCH=${{ matrix.goarch }} go test -exec=${{ matrix.qemu }} ./...
